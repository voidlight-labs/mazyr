services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mazyr-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./memory/qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
